  - packages/*

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ^7
  vite: npm:@voidzero-dev/vite-plus-core@0.2.4
  vitest: 4.1.10
  vite-plus: 0.2.4
  vue: 3.6.0-beta.17
  vue-router: 5.2.0
  pinia: 3.0.4
  pinia-plugin-persistedstate: 4.7.1
  "@tanstack/vue-query": 5.101.2
  reka-ui: 2.10.1
  ofetch: 1.5.1
  zod: 4.4.3
  markdown-it: 14.3.0
  katex: 0.17.0
  "@microsoft/signalr": 10.0.0
  md-editor-v3: 6.5.3
  vue-virtual-scroller: 3.0.4
  aplayer: 1.10.1
  dplayer: 1.27.1
  hls.js: 1.6.16
  "@vue/runtime-core": 3.6.0-beta.17
  unocss: 66.7.5
  "@unocss/preset-attributify": 66.7.5
  "@unocss/preset-typography": 66.7.5
  "@types/markdown-it": ^14.1.2
  "@vitejs/plugin-vue": 6.0.8
  "@vueuse/core": 14.3.0
  "@vueuse/integrations": 14.3.0
  dayjs: 1.11.21
  nanoid: 5.1.16
  clsx: 2.1.1
  pino: 10.3.1
  zod-openapi: ^6.0.0
  knip: ^6.26.0
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
allowBuilds:
  agent-browser: true
  cpu-features: false
  ibm_db: false
  kerberos: false
  oracledb: false
  ssh2: false
  vue-demi: true
minimumReleaseAgeExclude:
  - "@unocss/cli@66.7.5"
  - "@unocss/config@66.7.5"
  - "@unocss/core@66.7.5"
  - "@unocss/extractor-arbitrary-variants@66.7.5"
  - "@unocss/inspector@66.7.5"
  - "@unocss/preset-attributify@66.7.5"
  - "@unocss/preset-icons@66.7.5"
  - "@unocss/preset-mini@66.7.5"
  - "@unocss/preset-tagify@66.7.5"
  - "@unocss/preset-typography@66.7.5"
  - "@unocss/preset-uno@66.7.5"
  - "@unocss/preset-web-fonts@66.7.5"
  - "@unocss/preset-wind3@66.7.5"
  - "@unocss/preset-wind4@66.7.5"
  - "@unocss/preset-wind@66.7.5"
  - "@unocss/rule-utils@66.7.5"
  - "@unocss/transformer-attributify-jsx@66.7.5"
  - "@unocss/transformer-compile-class@66.7.5"
  - "@unocss/transformer-directives@66.7.5"
  - "@unocss/transformer-variant-group@66.7.5"
  - "@unocss/vite@66.7.5"
  - unocss@66.7.5
  - agent-browser@0.32.2
